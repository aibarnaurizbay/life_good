name: Build unsigned iOS IPA

on:
  push:
    branches:
      - main # Сборка будет запускаться при каждом пуше в ветку main. Если у вас ветка master, замените на master.
  workflow_dispatch: # Позволяет запускать сборку вручную из интерфейса GitHub

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Подгружаем зависимости
      - name: Install dependencies
        run: |
          flutter pub get
          
      # 4. Собираем iOS проект без подписи (это создаст правильный Runner.app)
      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign

      # 5. Правильно упаковываем в Payload
      - name: Create IPA payload
        run: |
          mkdir Payload
          # Копируем созданный Runner.app в папку Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # Архивируем в .ipa
          zip -vr app.ipa Payload/

      # 6. Загружаем готовый .ipa в артефакты GitHub
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-unsigned-ipa
          path: app.ipa
